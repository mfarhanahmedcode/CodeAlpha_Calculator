<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-wrapper">
        <!-- Calculator -->
        <main class="calculator" id="calculator">
            <!-- calculator topbar -->
            <div class="calc-topbar">
                <span class="calc-title">Calculator</span>
                <div class="topbar-actions">
                    <button class="icon-btn" id="historyToggle" title="Toggle history"
                        aria-label="Toggle history">🕘</button>
                    <button class="icon-btn" id="themeToggle" title="Toggle light/dark mode"
                        aria-label="Toggle theme">🌙</button>
                </div>
            </div>

            <!-- Display Screen -->
            <section class="display" id="display">
                <div class="display-expression" id="expression">&nbsp;</div>
                <div class="display-current" id="current">0</div>
            </section>

            <section class="keys" id="keys">
                <!-- row 1 -->
                <button class="key key-function" data-action="clear">AC</button>
                <button class="key key-function" data-action="delete">Del</button>
                <button class="key key-function" data-action="percent">%</button>
                <button class="key key-operator" data-action="operator" data-value="/">÷</button>

                <!-- row 2 -->
                <button class="key key-number" data-action="number" data-value="7">7</button>
                <button class="key key-number" data-action="number" data-value="8">8</button>
                <button class="key key-number" data-action="number" data-value="9">9</button>
                <button class="key key-operator" data-action="operator" data-value="*">×</button>
                
                <!-- row 3 -->
                <button class="key key-number" data-action="number" data-value="4">4</button>
                <button class="key key-number" data-action="number" data-value="5">5</button>
                <button class="key key-number" data-action="number" data-value="6">6</button>
                <button class="key key-operator" data-action="operator" data-value="-">-</button>

                <!-- row 4 -->
                <button class="key key-number" data-action="number" data-value="1">1</button>
                <button class="key key-number" data-action="number" data-value="2">2</button>
                <button class="key key-number" data-action="number" data-value="3">3</button>
                <button class="key key-operator" data-action="operator" data-value="+">+</button>

                <!-- row 5 -->
                <button class="key key-number key-zero" data-action="number" data-value="0">0</button>
                <button class="key key-number" data-action="decimal">.</button>
                <button class="key key-equals" data-action="equals">=</button>
            </section>
        </main>
        <!-- History Panel -->
        <aside class="history-panel" id="historyPanel">
            <div class="history-header">
                <span>History</span>
                <button class="icon-btn" id="clearHistory" title="Clear history" aria-label="Clear history">🗑</button>
            </div>
            <ul class="history-list" id="historyList">
                <li class="history-empty">No calculations yet</li>
            </ul>
        </aside>
    </div>

    <script src="script.js"></script>
</body>

</html>
